<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/img/icon.png" />
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/bootstrap-icons.css" rel="stylesheet">
    <style>
        audio {
            width: 100%;
            min-width: 200px;
            height: 40px;
            display: block;
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(25, 135, 84, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(25, 135, 84, 0); }
            100% { box-shadow: 0 0 0 0 rgba(25, 135, 84, 0); }
        }
        .btn-blink-active {
            animation: pulse-green 2s infinite;
        }
        .btn {
          border-color: var(--bs-border-color) !important;
        }
        #loading-spinner.active-overlay {
            background: rgba(255, 255, 255, 0.7);
            width: 100vw;
            height: 100vh;
            display: flex !important;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="d-flex flex-column vh-100 bg-light">
    <div id="loading-spinner" class="d-none position-fixed top-50 start-50 translate-middle" style="z-index: 9999;">
      <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <main id="chat-window" class="flex-grow-1 overflow-auto p-3 d-flex flex-column gap-3"></main>

    <footer class="p-3">
        <div class="input-group">
            <button class="btn btn-outline-danger" id="btn-restart" type="button">
                <i class="bi bi-arrow-counterclockwise" id="icon-restart"></i>
            </button>
            <button class="btn btn-outline-success d-none" id="btn-phone" type="button">
                <i class="bi bi-headset" id="icon-phone"></i>
            </button>
            <button class="btn btn-outline-warning d-none" id="btn-record" type="button">
                <i class="bi bi-mic-fill" id="icon-mic"></i>
            </button>
            <input type="text" class="form-control" id="input-text" placeholder="Type a message..." autocomplete="off" autofocus>
            <button class="btn btn-outline-info" id="btn-send" type="button">
                <i class="bi bi-send-fill"></i>
            </button>
        </div>
    </footer>

    <script src="/static/js/bootstrap.min.js"></script>
    <script src="/pbx/vad/ort.wasm.min.js"></script>
    <script src="/pbx/vad/bundle.min.js"></script>
    <script src="/pbx/marked.min.js"></script>
    <script src="/pbx/script.js"></script>
</body>
</html>
